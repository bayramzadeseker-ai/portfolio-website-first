
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title> Sheker Bayramzade|Frontend Developer</title>
  <link rel="stylesheet" href="/portfolio-example/style.css">
</head>
<body>

<header class="header">
  <h1 class="logo">SB</h1>

  <nav>
    <a href="#home">Home</a>
    <a href="#projects">Projects</a>
    <a href="#skills">Skills</a>
    <a href="#contact">Contact</a>
  </nav>
</header>

<!-- HERO -->
<section id="home" class="section hero">
  <div class="hero-content">
    <h2>Frontend Developer</h2>
    <p>I build modern, fast and interactive web experiences</p>
    <button onclick="scrollToSection('projects')">View Projects</button>
  </div>
</section>

<!-- PROJECTS -->
<section id="projects" class="section">
  <h2 class="title">Projects</h2>

  <div class="grid">
    <div class="card" onclick="openModal('Portfolio Website','Modern responsive portfolio with animations')">
      <h3>Portfolio Website</h3>
      <p>UI + Animations</p>
    </div>

    <div class="card" onclick="openModal('Todo App','JavaScript app with localStorage')">
      <h3>Todo App</h3>
      <p>JS Logic</p>
    </div>
  </div>
</section>

<!-- SKILLS -->
<section id="skills" class="section">
  <h2 class="title">Skills</h2>

  <div class="skills">
    <span>HTML</span>
    <span>CSS</span>
    <span>JavaScript</span>
    <span>Responsive Design</span>
    <span>Git</span>
  </div>
</section>

<!-- CONTACT -->
<section id="contact" class="section">
  <h2 class="title">Contact</h2>
  <button onclick="alert('Message sent!')">Hire Me</button>
</section>

<!-- MODAL -->
<div id="modal" class="modal">
  <div class="modal-box">
    <span onclick="closeModal()" class="close">×</span>
    <h3 id="modalTitle"></h3>
    <p id="modalDesc"></p>
  </div>
</div>

<script src="/portfolio-example/app.js"></script>
</body>
</html>
